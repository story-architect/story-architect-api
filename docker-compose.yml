version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: story_architect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/story_architect
      - BACKEND_CORS_ORIGINS=["http://localhost", "http://localhost:4200", "http://localhost:5173"]
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  postgres_data:
