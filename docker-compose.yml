version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: story_architect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/story_architect
      - BACKEND_CORS_ORIGINS=["http://localhost", "http://localhost:4200", "http://localhost:5173"]
    depends_on:
      - db
    volumes:
      - .:/app

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../story_architect_frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - CHOKIDAR_USEPOLLING=true

  docs:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../story_architect_docs:/app
    ports:
      - "5174:5173"
    command: sh -c "npm install && npm run docs:dev -- --host 0.0.0.0"
    environment:
      - CHOKIDAR_USEPOLLING=true

  sonarqube:
    image: sonarqube:9.9.0-community
    ports:
      - "9000:9000"
    environment:
      - SONAR_FORCEAUTHENTICATION=false
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

  sonar-init:
    image: curlimages/curl:latest
    depends_on:
      - sonarqube
    command: >
      sh -c "
      echo 'Waiting for SonarQube to start (this can take 1-2 minutes)...'
      until curl -s http://sonarqube:9000/api/system/status | grep -q '\"status\":\"UP\"'; do
        sleep 5;
      done;
      echo 'SonarQube is UP!'
      
      echo 'Changing default admin password...'
      curl -s -u admin:admin -X POST 'http://sonarqube:9000/api/users/change_password?login=admin&previousPassword=admin&password=admin123'
      
      echo 'Generating new token...'
      TOKEN_JSON=$$(curl -s -u admin:admin123 -X POST 'http://sonarqube:9000/api/user_tokens/generate?name=local_dev_token')
      TOKEN=$$(echo $$TOKEN_JSON | grep -o '\"token\":\"[^\"]*' | grep -o '[^\"]*$$')
      
      echo ''
      echo '==================================================='
      echo 'SONARQUBE TOKEN GENERATED:'
      echo \"$$TOKEN\"
      echo '==================================================='
      echo 'Run this in your terminal before running the scanner:'
      echo \"export SONAR_TOKEN=$$TOKEN\"
      echo \"Or set it in your .env file.\"
      echo '==================================================='
      "

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
